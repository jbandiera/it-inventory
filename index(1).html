<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#6b3ebd">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Inventory">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<title>Inventory Manifest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --paper:#FBF7FE;
    --paper-alt:#F3E8FC;
    --card:#FFFFFF;
    --ink:#3B1E63;
    --ink-soft:#9078AD;
    --line:#EAD9F7;
    --purple:#6B3EBD;
    --purple-bg:#EFE4FA;
    --pink:#E0ABF8;
    --pink-bg:#FBEFFD;
    --green:#2F9E63;
    --green-bg:#E1F5EA;
    --rust:#E0527A;
    --rust-bg:#FCE7ED;
    --blue:#6B3EBD;
    --blue-bg:#EFE4FA;
    --amber:#C98A1F;
    --amber-bg:#FAF0DC;
    --radius:18px;
    --shadow: 0 2px 10px rgba(107,62,189,0.10), 0 1px 3px rgba(107,62,189,0.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    background-image:
      linear-gradient(var(--paper-alt) 1px, transparent 1px);
    background-size: 100% 32px;
    color:var(--ink);
    font-family:'Nunito',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  #app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative;padding-bottom:78px;}

  /* HEADER */
  header.top{
    padding:24px 18px 16px;
    border-bottom:none;
    background:linear-gradient(135deg, var(--purple) 0%, #9257DB 55%, var(--pink) 100%);
    position:sticky;top:0;z-index:20;
    box-shadow:0 2px 14px rgba(107,62,189,0.22);
  }
  .brand-row{display:flex;align-items:baseline;justify-content:space-between;}
  .brand{
    font-family:'Nunito',sans-serif;
    font-weight:800;
    font-size:25px;
    letter-spacing:0.2px;
    color:#fff;
  }
  .brand small{
    display:block;font-family:'Nunito',sans-serif;font-weight:600;
    font-size:12px;letter-spacing:0.3px;color:rgba(255,255,255,0.85);margin-top:3px;
  }
  .stat-strip{display:flex;gap:14px;margin-top:14px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:600;}
  .stat-strip .s{color:rgba(255,255,255,0.75);}
  .stat-strip b{color:#fff;font-weight:800;}

  /* MAIN */
  main{flex:1;padding:14px 14px 8px;}
  .section-title{
    font-family:'Nunito',sans-serif;text-transform:uppercase;letter-spacing:1px;
    font-size:13px;color:var(--ink-soft);margin:14px 4px 8px;font-weight:600;
  }
  input[type=text], input[type=number]{
    font-family:'Nunito',sans-serif;font-size:15px;padding:11px 13px;border-radius:8px;
    border:1.5px solid var(--line);background:var(--card);color:var(--ink);width:100%;
  }
  input[type=text]:focus, input[type=number]:focus{outline:none;border-color:var(--ink);}

  /* CATEGORY GROUP */
  details.cat{
    background:var(--card);border-radius:var(--radius);margin-bottom:10px;border:1.5px solid var(--line);
    overflow:hidden;box-shadow:var(--shadow);
  }
  details.cat summary{
    list-style:none;cursor:pointer;padding:13px 16px;display:flex;justify-content:space-between;align-items:center;
    font-family:'Nunito',sans-serif;font-weight:800;font-size:14.5px;letter-spacing:0.2px;color:var(--purple);
  }
  details.cat summary::-webkit-details-marker{display:none;}
  summary .count{font-family:'Nunito',sans-serif;font-weight:700;font-size:11.5px;color:var(--ink-soft);background:var(--pink-bg);padding:3px 9px;border-radius:999px;}
  summary .chev{transition:transform .2s ease;color:var(--pink);font-size:12px;}
  details[open] summary .chev{transform:rotate(90deg);}

  .item-row{
    display:flex;align-items:center;gap:10px;padding:11px 16px;border-top:1px solid var(--line);cursor:pointer;
  }
  .item-row:active{background:var(--pink-bg);}
  .item-id{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--ink-soft);white-space:nowrap;}
  .item-main{flex:1;min-width:0;}
  .item-name{font-size:14px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .item-sub{font-size:11.5px;color:var(--ink-soft);}
  .badge{
    font-family:'Nunito',sans-serif;font-size:10.5px;font-weight:800;padding:4px 10px;border-radius:999px;
    white-space:nowrap;letter-spacing:0.5px;text-transform:uppercase;
  }
  .badge.in{background:var(--green-bg);color:var(--green);}
  .badge.out{background:var(--rust-bg);color:var(--rust);}
  .badge.stock{background:var(--blue-bg);color:var(--blue);}
  .badge.low{background:var(--amber-bg);color:var(--amber);}

  /* BOTTOM NAV */
  nav.bottom{
    position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;
    background:var(--card);border-top:1px solid var(--line);display:flex;z-index:30;
    padding-bottom:env(safe-area-inset-bottom);
    box-shadow:0 -2px 14px rgba(107,62,189,0.10);
  }
  nav.bottom button{
    flex:1;background:none;border:none;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;
    color:var(--ink-soft);font-family:'Nunito',sans-serif;font-size:10.5px;letter-spacing:0.3px;font-weight:700;
    cursor:pointer;
  }
  nav.bottom button.active{color:var(--purple);}
  nav.bottom button svg{width:20px;height:20px;}
  nav.bottom button .dot{width:5px;height:5px;border-radius:50%;background:var(--pink);opacity:0;margin-top:-1px;}
  nav.bottom button.active .dot{opacity:1;}

  /* FAB */
  .fab{
    position:fixed;right:calc(50% - 260px + 18px);bottom:calc(78px + env(safe-area-inset-bottom) + 14px);
    width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg, var(--purple), #9257DB);color:#fff;border:none;
    font-size:28px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;
    box-shadow:0 4px 14px rgba(107,62,189,0.4);z-index:35;
  }
  @media (max-width:556px){
    .fab{right:18px;}
  }
  .fab.hidden{display:none;}

  /* STAMP */
  .stamp{
    display:inline-block;font-family:'Nunito',sans-serif;font-weight:800;font-size:12.5px;letter-spacing:0.5px;
    padding:7px 18px;border-radius:999px;
    text-transform:uppercase;color:#fff;
  }
  .stamp.in{background:var(--green);}
  .stamp.out{background:var(--rust);}

  /* SHEET / MODAL */
  .overlay{
    position:fixed;inset:0;background:rgba(59,30,99,0.35);z-index:50;display:flex;align-items:flex-end;justify-content:center;
  }
  .overlay.hidden{display:none;}
  .sheet{
    background:var(--paper);width:100%;max-width:520px;max-height:88vh;overflow-y:auto;
    border-radius:24px 24px 0 0;border-top:none;padding:16px 18px 28px;
    animation:slideup .22s ease;
    box-shadow:0 -4px 24px rgba(107,62,189,0.18);
  }
  @keyframes slideup{from{transform:translateY(24px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .sheet-handle{width:38px;height:4px;background:var(--line);border-radius:3px;margin:0 auto 14px;}
  .sheet-close{
    position:absolute;top:14px;right:16px;background:none;border:none;font-size:22px;color:var(--ink-soft);cursor:pointer;line-height:1;
  }
  .tag-card{
    background:var(--card);border:2px solid var(--pink);border-radius:20px;padding:18px;text-align:center;position:relative;margin-bottom:16px;
    box-shadow:var(--shadow);
  }
  .tag-card .qr-box{display:flex;justify-content:center;margin-bottom:10px;}
  .tag-card .qr-box img, .tag-card .qr-box canvas{image-rendering:pixelated;}
  .tag-id{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:15px;letter-spacing:1px;}
  .tag-name{font-family:'Nunito',sans-serif;font-weight:800;font-size:17px;margin-top:4px;color:var(--ink);}
  .tag-cat{font-size:12px;color:var(--ink-soft);margin-top:2px;font-weight:600;}

  .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
  .info-box{background:var(--pink-bg);border:1.5px solid var(--line);border-radius:14px;padding:10px 12px;}
  .info-box .lbl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--ink-soft);font-family:'Nunito',sans-serif;font-weight:700;}
  .info-box .val{font-size:15px;font-weight:800;margin-top:2px;color:var(--ink);}

  .btn{
    font-family:'Nunito',sans-serif;font-weight:800;font-size:14.5px;letter-spacing:0.2px;
    padding:14px;border-radius:999px;border:none;background:linear-gradient(135deg, var(--purple), #9257DB);color:#fff;width:100%;cursor:pointer;
    box-shadow:0 3px 10px rgba(107,62,189,0.3);
  }
  .btn:active{opacity:0.85;}
  .btn.ghost{background:none;color:var(--purple);box-shadow:none;border:2px solid var(--purple);}
  .btn.green{background:var(--green);color:#fff;box-shadow:0 3px 10px rgba(47,158,99,0.3);}
  .btn.rust{background:var(--rust);color:#fff;box-shadow:0 3px 10px rgba(224,82,122,0.3);}
  .btn.small{padding:8px 14px;font-size:11.5px;width:auto;box-shadow:none;}

  .field{margin-bottom:12px;}
  .field label{display:block;font-size:11.5px;text-transform:uppercase;letter-spacing:0.4px;color:var(--purple);margin-bottom:5px;font-family:'Nunito',sans-serif;font-weight:700;}

  .checkout-row{
    background:var(--pink-bg);border:1px solid var(--line);border-radius:14px;padding:10px 14px;margin-bottom:8px;
    display:flex;justify-content:space-between;align-items:center;gap:8px;
  }
  .checkout-row .who{font-size:13.5px;font-weight:700;color:var(--ink);}
  .checkout-row .meta{font-size:11px;color:var(--ink-soft);}

  /* SCAN */
  .scan-wrap{padding:14px;}
  .scan-frame{
    position:relative;border-radius:20px;overflow:hidden;border:3px solid var(--purple);aspect-ratio:1/1;background:#111;
  }
  .scan-frame video{width:100%;height:100%;object-fit:cover;display:block;}
  .scan-corner-hint{
    position:absolute;inset:12%;border:3px solid rgba(255,255,255,0.75);border-radius:16px;pointer-events:none;
  }
  .scan-msg{text-align:center;color:var(--ink-soft);font-size:13px;margin:14px 0;font-weight:600;}
  .manual-scan{margin-top:16px;display:flex;gap:8px;}
  .manual-scan input{flex:1;}
  .manual-scan button{width:auto;padding:11px 16px;}

  /* PRINT */
  .print-controls{display:flex;gap:8px;margin-bottom:14px;}
  .label-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .label-card{
    background:var(--card);border:2px solid var(--pink);border-radius:14px;padding:10px;text-align:center;
  }
  .label-card .qr-box{display:flex;justify-content:center;margin-bottom:6px;}
  .label-card .lname{font-size:11px;font-weight:800;line-height:1.2;font-family:'Nunito',sans-serif;color:var(--purple);}
  .label-card .lid{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-soft);margin-top:3px;}

  /* ACTIVITY */
  .log-row{
    background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px 14px;margin-bottom:8px;
    display:flex;justify-content:space-between;gap:10px;
  }
  .log-left .log-item{font-size:13.5px;font-weight:700;color:var(--ink);}
  .log-left .log-meta{font-size:11.5px;color:var(--ink-soft);margin-top:2px;}
  .log-right{text-align:right;font-family:'Nunito',sans-serif;font-weight:700;font-size:11px;color:var(--ink-soft);white-space:nowrap;}
  .empty-state{text-align:center;padding:50px 20px;color:var(--ink-soft);}
  .empty-state .big{font-family:'Nunito',sans-serif;font-weight:800;font-size:17px;color:var(--purple);margin-bottom:6px;}

  .toast{
    position:fixed;bottom:92px;left:50%;transform:translateX(-50%);background:var(--purple);color:#fff;
    padding:11px 20px;border-radius:999px;font-size:13px;font-weight:700;z-index:80;box-shadow:0 4px 14px rgba(107,62,189,0.35);
    max-width:88%;text-align:center;
  }

  a.reset-link{font-size:11.5px;color:var(--ink-soft);text-decoration:underline;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;}

  @media print{
    body{background:#fff;}
    header.top, nav.bottom, .no-print{display:none !important;}
    #app{padding-bottom:0;max-width:100%;}
    main{padding:0;}
    .label-grid{grid-template-columns:repeat(3,1fr);gap:8px;}
    .label-card{break-inside:avoid;border:1px dashed #999;}
  }
</style>
</head>
<body>
<div id="app">

  <header class="top">
    <div class="brand-row">
      <div class="brand">Inventory<small>Your gear, all in one place</small></div>
    </div>
    <div class="stat-strip">
      <div class="s">Items <b id="statTotal">-</b></div>
      <div class="s">Units <b id="statUnits">-</b></div>
      <div class="s">Checked Out <b id="statOut">-</b></div>
    </div>
  </header>

  <main id="main"></main>

  <nav class="bottom no-print">
    <button data-tab="inventory" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M4 10h16M10 4v16"/></svg>
      <span>List</span><span class="dot"></span>
    </button>
    <button data-tab="scan">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 8V5a1 1 0 0 1 1-1h3M20 8V5a1 1 0 0 0-1-1h-3M4 16v3a1 1 0 0 0 1 1h3M20 16v3a1 1 0 0 1-1 1h-3M4 12h16"/></svg>
      <span>Scan</span><span class="dot"></span>
    </button>
    <button data-tab="print">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 9V3h12v6M6 18H4a1 1 0 0 1-1-1v-5a1 1 0 0 1 1-1h16a1 1 0 0 1 1 1v5a1 1 0 0 1-1 1h-2M6 14h12v7H6z"/></svg>
      <span>Labels</span><span class="dot"></span>
    </button>
    <button data-tab="activity">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 12h4l3 8 4-16 3 8h4"/></svg>
      <span>Activity</span><span class="dot"></span>
    </button>
  </nav>

  <button class="fab no-print" id="addFab" title="Add item">+</button>
  <div id="overlayRoot"></div>
</div>

/* ============ STATE ============ */
let STATE = null;
let currentTab = 'inventory';
let scanStream = null;
let scanRAF = null;

function defaultRuntime(item){
  if(item.type === 'unit'){
    return {status:'in', holder:null, purpose:null, since:null};
  } else {
    return {available:item.qty, checkouts:[]};
  }
}

/* ============ STORAGE ADAPTER (works inside Claude, and standalone) ============ */
const hasClaudeStorage = typeof window.storage !== 'undefined' && window.storage && typeof window.storage.get === 'function';

async function storageGet(key){
  if(hasClaudeStorage){
    try{ return await window.storage.get(key, false); }
    catch(e){ return null; }
  }
  try{
    const raw = localStorage.getItem(key);
    return raw === null ? null : {key, value: raw};
  }catch(e){ return null; }
}

async function storageSet(key, value){
  if(hasClaudeStorage){
    try{ return await window.storage.set(key, value, false); }
    catch(e){ return null; }
  }
  try{
    localStorage.setItem(key, value);
    return {key, value};
  }catch(e){ return null; }
}

async function loadState(){
  const res = await storageGet('inventory-state');
  if(res && res.value){
    try{ STATE = JSON.parse(res.value); return; }catch(e){ /* fall through to reseed */ }
  }
  const items = SEED_ITEMS.map(it => Object.assign({}, it, defaultRuntime(it)));
  STATE = {items, log:[]};
  await persist();
}

async function persist(){
  await storageSet('inventory-state', JSON.stringify(STATE));
}

function findItem(id){
  return STATE.items.find(i => i.id.toLowerCase() === String(id).toLowerCase());
}

function uid(){ return Math.random().toString(36).slice(2,9); }

function nowStr(){
  const d = new Date();
  return d.toLocaleDateString(undefined,{month:'short',day:'numeric'}) + ' · ' + d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
}

/* ============ TOAST ============ */
function toast(msg){
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 2200);
}

/* ============ RENDER: STATS ============ */
function renderStats(){
  const total = STATE.items.length;
  const units = STATE.items.reduce((a,i)=>a+i.qty,0);
  let out = 0;
  STATE.items.forEach(i=>{
    if(i.type==='unit' && i.status==='out') out += 1;
    if(i.type==='stock') out += (i.checkouts||[]).reduce((a,c)=>a+c.qty,0);
  });
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statUnits').textContent = units;
  document.getElementById('statOut').textContent = out;
}

/* ============ TAB SWITCH ============ */
function switchTab(tab){
  currentTab = tab;
  document.querySelectorAll('nav.bottom button').forEach(b=>{
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  render();
  stopScan();
  if(tab === 'scan') startScanUI();
  document.getElementById('addFab').classList.toggle('hidden', tab !== 'inventory');
}

document.querySelectorAll('nav.bottom button').forEach(b=>{
  b.addEventListener('click', ()=>switchTab(b.dataset.tab));
});

/* ============ MAIN RENDER ROUTER ============ */
function render(){
  renderStats();
  const main = document.getElementById('main');
  if(currentTab === 'inventory') return renderInventory(main);
  if(currentTab === 'scan') return renderScan(main);
  if(currentTab === 'print') return renderPrint(main);
  if(currentTab === 'activity') return renderActivity(main);
}

/* ============ INVENTORY TAB ============ */
let searchQuery = '';
function renderInventory(main){
  const byCat = {};
  STATE.items.forEach(it=>{
    const q = searchQuery.trim().toLowerCase();
    if(q){
      const hay = (it.id+' '+it.brand+' '+it.model+' '+it.category).toLowerCase();
      if(!hay.includes(q)) return;
    }
    (byCat[it.category] = byCat[it.category] || []).push(it);
  });

  let html = `<input type="text" id="searchBox" placeholder="Search brand, model, or ID..." value="${escapeHtml(searchQuery)}">`;

  const cats = Object.keys(byCat);
  if(cats.length === 0){
    html += `<div class="empty-state"><div class="big">No matches</div>Try a different search term.</div>`;
  }
  cats.forEach(cat=>{
    const items = byCat[cat];
    html += `<details class="cat" open><summary><span>${escapeHtml(cat)}</span><span style="display:flex;align-items:center;gap:8px;"><span class="count">${items.length} SKU</span><span class="chev">&#9656;</span></span></summary>`;
    items.forEach(it=>{
      let badge = '';
      if(it.type==='unit'){
        badge = it.status==='out' ? `<span class="badge out">Out</span>` : `<span class="badge in">In</span>`;
      } else {
        const low = it.available <= Math.ceil(it.qty*0.2) && it.available < it.qty;
        badge = `<span class="badge ${low?'low':'stock'}">${it.available}/${it.qty}</span>`;
      }
      html += `<div class="item-row" data-id="${it.id}">
        <div class="item-main">
          <div class="item-name">${escapeHtml(it.brand)} ${escapeHtml(it.model)}</div>
          <div class="item-sub item-id">${it.id}</div>
        </div>
        ${badge}
      </div>`;
    });
    html += `</details>`;
  });

  main.innerHTML = html;
  const sb = document.getElementById('searchBox');
  sb.addEventListener('input', (e)=>{ searchQuery = e.target.value; renderInventory(main); sb.focus(); sb.setSelectionRange(sb.value.length, sb.value.length); });
  main.querySelectorAll('.item-row').forEach(row=>{
    row.addEventListener('click', ()=>openDetail(row.dataset.id));
  });
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ============ ITEM DETAIL SHEET ============ */
function openDetail(id){
  const it = findItem(id);
  if(!it){ toast('Item not found: '+id); return; }
  const root = document.getElementById('overlayRoot');

  let statusBlock = '';
  if(it.type === 'unit'){
    if(it.status === 'in'){
      statusBlock = `
        <div style="text-align:center;margin-bottom:14px;"><span class="stamp in">In Stock</span></div>
        <button class="btn green" id="doCheckout">Check Out</button>`;
    } else {
      statusBlock = `
        <div style="text-align:center;margin-bottom:14px;"><span class="stamp out">Checked Out</span></div>
        <div class="info-grid">
          <div class="info-box"><div class="lbl">Holder</div><div class="val">${escapeHtml(it.holder||'-')}</div></div>
          <div class="info-box"><div class="lbl">Since</div><div class="val" style="font-size:12.5px;">${escapeHtml(it.since||'-')}</div></div>
        </div>
        ${it.purpose ? `<div class="info-box" style="margin-bottom:16px;"><div class="lbl">Purpose</div><div class="val" style="font-size:13.5px;">${escapeHtml(it.purpose)}</div></div>` : ''}
        <button class="btn rust" id="doCheckin">Check In</button>`;

      <div class="checkout-row">
        <div>
          <div class="who">${escapeHtml(c.holder)} <span style="color:var(--ink-soft);font-weight:400;">× ${c.qty}</span></div>

        <button class="btn small rust" data-return="${c.id}">Return</button>
      </div>`).join('');
    statusBlock = `
      <div class="info-grid">
        <div class="info-box"><div class="lbl">Available</div><div class="val" style="color:${it.available>0?'var(--green)':'var(--rust)'}">${it.available}</div></div>
        <div class="info-box"><div class="lbl">Total</div><div class="val">${it.qty}</div></div>
      </div>
      <button class="btn green" id="doStockOut" ${it.available<=0?'disabled style="opacity:.4"':''}>Check Out</button>
      ${openList ? `<div class="section-title" style="margin-left:0;">Currently Out</div>${openList}` : ''}
    `;
  }

  root.innerHTML = `
    <div class="overlay" id="detailOverlay">
      <div class="sheet" style="position:relative;">
        <button class="sheet-close" id="closeDetail">&times;</button>
        <div class="sheet-handle"></div>
        <div class="tag-card">
          <div class="qr-box" id="qrTarget"></div>
          <div class="tag-id">${it.id}</div>
          <div class="tag-name">${escapeHtml(it.brand)} ${escapeHtml(it.model)}</div>
          <div class="tag-cat">${escapeHtml(it.category)}</div>
        </div>
        ${statusBlock}
      </div>
    </div>`;

  renderQR(document.getElementById('qrTarget'), it.id, 150);

  document.getElementById('detailOverlay').addEventListener('click', (e)=>{
    if(e.target.id === 'detailOverlay') closeDetail();
  });
  document.getElementById('closeDetail').addEventListener('click', closeDetail);

  const co = document.getElementById('doCheckout');
  if(co) co.addEventListener('click', ()=>openCheckoutForm(it, 'unit'));
  const ci = document.getElementById('doCheckin');
  if(ci) ci.addEventListener('click', ()=>{ checkInUnit(it); closeDetail(); });
  const so = document.getElementById('doStockOut');
  if(so) so.addEventListener('click', ()=>openCheckoutForm(it, 'stock'));
  root.querySelectorAll('[data-return]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      returnStock(it, btn.dataset.return);
      openDetail(it.id);
    });
  });
}

function closeDetail(){
  document.getElementById('overlayRoot').innerHTML = '';
}

function renderQR(container, text, size){
  container.innerHTML = '';
  new QRCode(container, {
    text: text, width: size, height: size,
    colorDark:'#3B1E63', colorLight:'#FFFFFF',
    correctLevel: QRCode.CorrectLevel.M
  });
}

        <button class="sheet-close" id="closeForm">&times;</button>
        <div class="sheet-handle"></div>
        <div class="section-title" style="margin-top:0;">Check Out &mdash; ${it.id}</div>
        ${qtyField}
        <div class="field">
          <label>Held by</label>
          <input type="text" id="foHolder" placeholder="Name">
        </div>
        <div class="field">
          <label>Purpose / destination</label>
          <input type="text" id="foPurpose" placeholder="e.g. Stream setup, Room 4">
        </div>
        <button class="btn green" id="foSubmit">Confirm Check Out</button>
      </div>
    </div>`;
  document.getElementById('formOverlay').addEventListener('click', (e)=>{
    if(e.target.id === 'formOverlay') closeDetail();
  });
  document.getElementById('closeForm').addEventListener('click', ()=>openDetail(it.id));
  document.getElementById('foSubmit').addEventListener('click', ()=>{
    const holder = document.getElementById('foHolder').value.trim();
    const purpose = document.getElementById('foPurpose').value.trim();
    if(!holder){ toast('Enter who is holding this item'); return; }
    if(mode === 'unit'){
      checkOutUnit(it, holder, purpose);
    } else {
      const qty = parseInt(document.getElementById('foQty').value, 10) || 1;
      if(qty < 1 || qty > it.available){ toast('Invalid quantity'); return; }
      checkOutStock(it, qty, holder, purpose);
    }
    openDetail(it.id);
  });
}

/* ============ CHECK IN/OUT LOGIC ============ */
async function checkOutUnit(it, holder, purpose){
  it.status = 'out'; it.holder = holder; it.purpose = purpose; it.since = nowStr();
  STATE.log.unshift({ts:Date.now(), tsStr:nowStr(), itemId:it.id, itemName:it.brand+' '+it.model, action:'check_out', qty:1, holder, purpose});
  await persist(); render();
  toast(`${it.id} checked out to ${holder}`);
}
async function checkInUnit(it){
  STATE.log.unshift({ts:Date.now(), tsStr:nowStr(), itemId:it.id, itemName:it.brand+' '+it.model, action:'check_in', qty:1, holder:it.holder, purpose:it.purpose});
  it.status = 'in'; it.holder = null; it.purpose = null; it.since = null;
  await persist(); render();
  toast(`${it.id} checked in`);
}
async function checkOutStock(it, qty, holder, purpose){
  it.available -= qty;
  it.checkouts = it.checkouts || [];
  it.checkouts.push({id:uid(), qty, holder, purpose, since:nowStr()});
  STATE.log.unshift({ts:Date.now(), tsStr:nowStr(), itemId:it.id, itemName:it.brand+' '+it.model, action:'check_out', qty, holder, purpose});
  await persist(); render();
  toast(`${qty} × ${it.id} checked out to ${holder}`);
}
async function returnStock(it, checkoutId){
  const idx = (it.checkouts||[]).findIndex(c=>c.id===checkoutId);
  if(idx === -1) return;
  const c = it.checkouts[idx];
  it.available += c.qty;
  it.checkouts.splice(idx,1);
  STATE.log.unshift({ts:Date.now(), tsStr:nowStr(), itemId:it.id, itemName:it.brand+' '+it.model, action:'check_in', qty:c.qty, holder:c.holder, purpose:c.purpose});
  await persist(); render();
  toast(`${c.qty} × ${it.id} returned`);
}

/* ============ ADD ITEM ============ */
function categoryPrefix(category){
  let base = category.trim().slice(0,3).toUpperCase().replace(/[^A-Z0-9]/g,'');
  if(base.length === 0) base = 'GEN';
  while(base.length < 3) base += 'X';
  return base;
}
function nextIdForCategory(category){
  const prefix = categoryPrefix(category);
  let max = 0;
  STATE.items.forEach(it=>{
    if(it.id.startsWith(prefix+'-')){
      const n = parseInt(it.id.split('-')[1], 10);
      if(!isNaN(n) && n > max) max = n;
    }
  });
  const next = max + 1;
  return prefix + '-' + String(next).padStart(3,'0');
}

function openAddItemForm(){
  const root = document.getElementById('overlayRoot');
  const existingCats = Array.from(new Set(STATE.items.map(i=>i.category))).sort();
  root.innerHTML = `
    <div class="overlay" id="addOverlay">
      <div class="sheet" style="position:relative;">
        <button class="sheet-close" id="closeAdd">&times;</button>
        <div class="sheet-handle"></div>
        <div class="section-title" style="margin-top:0;">Add Item to Inventory</div>
        <div class="field">
          <label>Category</label>
          <input type="text" id="aiCategory" list="catList" placeholder="e.g. GPU, or a new category">
          <datalist id="catList">
            ${existingCats.map(c=>`<option value="${escapeHtml(c)}">`).join('')}
          </datalist>
        </div>
        <div class="field">
          <label>Brand</label>
          <input type="text" id="aiBrand" placeholder="e.g. ASUS">
        </div>
        <div class="field">
          <label>Model / Description</label>
          <input type="text" id="aiModel" placeholder="e.g. TUF Gaming VG27UQ1A">
        </div>
        <div class="field">
          <label>Quantity</label>
          <input type="number" id="aiQty" min="1" value="1">
        </div>
        <div class="scan-msg" style="text-align:left;margin:0 0 14px;">Qty of 1 gets individual in/out tracking. Qty above 1 becomes a shared stock item.</div>
        <button class="btn green" id="aiSubmit">Add Item</button>
      </div>
    </div>`;
  document.getElementById('addOverlay').addEventListener('click', (e)=>{
    if(e.target.id === 'addOverlay') closeDetail();
  });
  document.getElementById('closeAdd').addEventListener('click', closeDetail);
  document.getElementById('aiSubmit').addEventListener('click', async ()=>{
    const category = document.getElementById('aiCategory').value.trim();
    const brand = document.getElementById('aiBrand').value.trim();
    const model = document.getElementById('aiModel').value.trim();
    const qty = parseInt(document.getElementById('aiQty').value, 10);
    if(!category || !brand || !model){ toast('Fill in category, brand, and model'); return; }
    if(!qty || qty < 1){ toast('Quantity must be at least 1'); return; }
    const id = nextIdForCategory(category);
    const type = qty === 1 ? 'unit' : 'stock';
    const newItem = Object.assign({id, category, brand, model, qty, type}, defaultRuntime({type, qty}));
    STATE.items.push(newItem);
    await persist();
    closeDetail();
    render();
    toast(`Added ${id}`);
    openDetail(id);
  });
}

document.getElementById('addFab').addEventListener('click', openAddItemForm);

/* ============ SCAN TAB ============ */
function renderScan(main){
  main.innerHTML = `
    <div class="scan-wrap">
      <div class="scan-frame" id="scanFrame">
        <video id="scanVideo" autoplay playsinline muted></video>
        <div class="scan-corner-hint"></div>
      </div>
      <div class="scan-msg" id="scanMsg">Point the camera at an item's QR label.</div>
      <div class="manual-scan">
        <input type="text" id="manualId" placeholder="Or enter item ID, e.g. GPU-004">
        <button class="btn small" id="manualGo">Go</button>
      </div>
    </div>`;
  document.getElementById('manualGo').addEventListener('click', ()=>{
    const val = document.getElementById('manualId').value.trim();
    if(!val) return;
    const it = findItem(val);
    if(it){ openDetail(it.id); } else { toast('No item with ID '+val); }
  });
  document.getElementById('manualId').addEventListener('keydown', (e)=>{
    if(e.key === 'Enter') document.getElementById('manualGo').click();
  });
}

async function startScanUI(){
  const video = document.getElementById('scanVideo');
  const msg = document.getElementById('scanMsg');
  if(!video) return;
  try{
    scanStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    video.srcObject = scanStream;
    await video.play();
    msg.textContent = 'Scanning...';
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d', {willReadFrequently:true});
    let lastHit = 0;
    function tick(){
      if(!video.videoWidth){ scanRAF = requestAnimationFrame(tick); return; }
      canvas.width = video.videoWidth; canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
      const code = jsQR(imgData.data, imgData.width, imgData.height, {inversionAttempts:'dontInvert'});
      if(code && code.data && Date.now() - lastHit > 1500){
        const it = findItem(code.data);
        if(it){
          lastHit = Date.now();
          openDetail(it.id);
        }
      }
      scanRAF = requestAnimationFrame(tick);
    }
    scanRAF = requestAnimationFrame(tick);
  }catch(e){
    if(msg) msg.textContent = 'Camera unavailable — use manual entry below, or check browser permissions.';
  }
}

function stopScan(){
  if(scanRAF) cancelAnimationFrame(scanRAF);
  scanRAF = null;
  if(scanStream){
    scanStream.getTracks().forEach(t=>t.stop());
    scanStream = null;
  }
}

/* ============ PRINT TAB ============ */
function renderPrint(main){
  main.innerHTML = `
    <div class="print-controls no-print">
      <button class="btn" id="doPrint" style="width:auto;padding:11px 18px;">Print All Labels</button>
      <div style="align-self:center;font-size:12px;color:var(--ink-soft);">${STATE.items.length} labels</div>
    </div>
    <div class="label-grid" id="labelGrid"></div>
  `;
  document.getElementById('doPrint').addEventListener('click', ()=>window.print());
  const grid = document.getElementById('labelGrid');
  STATE.items.forEach(it=>{
    const card = document.createElement('div');
    card.className = 'label-card';
    card.innerHTML = `<div class="qr-box" id="qr-${it.id}"></div><div class="lname">${escapeHtml(it.brand)} ${escapeHtml(it.model)}</div><div class="lid">${it.id}</div>`;
    grid.appendChild(card);
  });
  STATE.items.forEach(it=>{
    renderQR(document.getElementById('qr-'+it.id), it.id, 90);
  });
}

/* ============ ACTIVITY TAB ============ */
function renderActivity(main){
  if(STATE.log.length === 0){
    main.innerHTML = `<div class="empty-state"><div class="big">No activity yet</div>Check an item in or out to see it logged here.</div>
      <div class="no-print" style="text-align:center;margin-top:20px;"><a class="reset-link" id="resetLink">Reset to original inventory</a></div>`;
  } else {
    let html = '';
    STATE.log.forEach(l=>{
      const actionLabel = l.action === 'check_out' ? 'Checked Out' : 'Checked In';
      const color = l.action === 'check_out' ? 'var(--rust)' : 'var(--green)';
      html += `<div class="log-row">
        <div class="log-left">
          <div class="log-item">${escapeHtml(l.itemName)} <span style="color:var(--ink-soft);font-weight:400;font-family:'IBM Plex Mono',monospace;font-size:11px;">${l.itemId}</span></div>
          <div class="log-meta">${escapeHtml(l.holder||'')} ${l.qty>1?'× '+l.qty:''} ${l.purpose?'· '+escapeHtml(l.purpose):''}</div>
        </div>
        <div class="log-right">
          <div style="color:${color};font-weight:600;">${actionLabel}</div>
          <div>${l.tsStr}</div>
        </div>
      </div>`;
    });
    html += `<div class="no-print" style="text-align:center;margin-top:16px;"><a class="reset-link" id="resetLink">Reset to original inventory</a></div>`;
    main.innerHTML = html;
  }
  const rl = document.getElementById('resetLink');
  if(rl) rl.addEventListener('click', resetInventory);
}

async function resetInventory(){
  if(!confirm('This clears all check-out history and restores original quantities. Continue?')) return;
  const items = SEED_ITEMS.map(it => Object.assign({}, it, defaultRuntime(it)));
  STATE = {items, log:[]};
  await persist();
  render();
  toast('Inventory reset');
}

/* ============ INIT ============ */
(async function init(){
  await loadState();
  render();
  if(!hasClaudeStorage && 'serviceWorker' in navigator){
    // Only register when hosted standalone (Claude's artifact sandbox doesn't allow this).
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }
})();
</script>
